root = "."
tmp_dir = "tmp"

[build]
  cmd = "npm run build && go build -o ./tmp/whitenoise-caster ."
  bin = "./tmp/whitenoise-caster"
  args_bin = ["-config", "config.yaml"]
  include_ext = ["go", "yaml", "ts", "html"]
  exclude_dir = ["tmp", "vendor", "node_modules"]
  delay = 500

[log]
  time = false

[color]
  main = "yellow"
  watcher = "cyan"
  build = "blue"
  runner = "green"

[misc]
  clean_on_exit = true
