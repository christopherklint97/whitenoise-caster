#     -n whitenoise --dry-run=client -o yaml | kubectl apply -f -
#
# This file shows the Secret structure for reference only.
# Do NOT commit real values.
apiVersion: v1
kind: Secret
metadata:
  name: whitenoise-config
  namespace: whitenoise
type: Opaque
stringData:
  config.yaml: |
    speakers:
      - name: "Living Room"
        ip: "192.168.0.100"
      - name: "Bedroom"
        ip: "192.168.0.101"

    audio_file: "/audio/whitenoise.mp3"
    audio_url: "https://noise.example.com"
    listen_addr: ":8080"

    auth:
      username: "changeme"
      password: "changeme"

    secret_path: ""
