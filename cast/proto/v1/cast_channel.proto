// Minimal CastMessage definition from Chromium's cast_channel.proto.
// Only includes what we need — no AuthChallenge/AuthResponse/DeviceAuthMessage.
// Must use proto2 to match the wire format Chromecast devices expect
// (required fields and zero-valued enums must be serialized).

syntax = "proto2";

package cast.proto.v1;

option go_package = "github.com/telnesstech/whitenoise-caster/cast/proto/v1";

message CastMessage {
  enum ProtocolVersion {
    CASTV2_1_0 = 0;
  }
  required ProtocolVersion protocol_version = 1;

  required string source_id = 2;
  required string destination_id = 3;
  required string namespace = 4;

  enum PayloadType {
    STRING = 0;
    BINARY = 1;
  }
  required PayloadType payload_type = 5;

  optional string payload_utf8 = 6;
  optional bytes payload_binary = 7;
}
