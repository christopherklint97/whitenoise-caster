services:
  app:
    build: .
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./config.prod.yaml:/app/config.yaml:ro
      - ./whitenoise.mp3:/app/whitenoise.mp3:ro

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./Caddyfile.prod:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
